apiVersion: 1

providers:
  - name: 'Akilli Enerji Dashboards'
    orgId: 1
    folder: ''
    folderUid: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      # If using Docker, path to the mounted dashboard JSON folder inside the container
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
