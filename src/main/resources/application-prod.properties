# ====================================
# URETIM ORTAMI KONFIGURASYONU
# ====================================

# Minimum loglama
logging.level.com.akillienerji=WARN
logging.level.org.springframework.integration.mqtt=ERROR

# Gercek InfluxDB baglantisi
influxdb.url=http://influxdb:8086
influxdb.token=${INFLUXDB_TOKEN}
influxdb.org=akillienerji
influxdb.bucket=enerji_verileri

# Gercek MQTT broker
mqtt.broker.url=tcp://mosquitto:1883

# Simule veri kapali
app.simulation-mode=false

# Actuator kisitli erisim
management.endpoints.web.exposure.include=health,info
