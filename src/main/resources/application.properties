spring.application.name=AkilliEnerjiSistemi
server.port=8080

# ===== Aktif Profil =====
# Gelistirme icin: dev | Uretim icin: prod
spring.profiles.active=dev

# ===== InfluxDB Ayarlari (InfluxDB Cloud - AWS eu-central-1) =====
influxdb.url=https://eu-central-1-1.aws.cloud2.influxdata.com
influxdb.token=${INFLUXDB_TOKEN:ARUstZ80J_wkjOUQaEcQL1eo9zj5jpfQPaEhmbUJlOcY_7Ab3y3BPLi2L2E2nyjyPkiLUo85UbHC4z1DL4xdWw==}
influxdb.org=akillienerji
influxdb.bucket=enerji_verileri

# ===== MQTT Ayarlari (Eclipse Mosquitto) =====
mqtt.broker.url=tcp://localhost:1883
mqtt.client.id=akilli-enerji-server
mqtt.username=
mqtt.password=
mqtt.topics=enerji/#,sistem/#
mqtt.qos=1

# ===== Makine Ogrenimi Ayarlari =====
ml.forecast.enabled=true
ml.anomaly.enabled=true
ml.anomaly.zscore-threshold=2.5

# ===== WebSocket =====
websocket.endpoint=/ws
websocket.allowed-origins=*

# ===== Mail Ayarlari (SMTP - opsiyonel) =====
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your-email@gmail.com
# spring.mail.password=your-password

# ===== Actuator (Saglik Kontrolu) =====
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ===== Loglama =====
logging.level.com.akillienerji=INFO
logging.level.org.springframework.integration.mqtt=WARN
