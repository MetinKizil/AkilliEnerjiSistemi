<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Akilli Enerji Yonetim Sistemi - Giris">
    <title>Giris | Akilli Enerji Sistemi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
    <div class="login-bg">
        <div class="energy-lines"></div>
    </div>

    <div class="login-container" id="loginContainer">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-bolt"></i>
                </div>
                <h1>Akilli Enerji</h1>
                <p>Yonetim Sistemi</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i>
                        Kullanici Adi
                    </label>
                    <input type="text" id="username" name="username" placeholder="Kullanici adinizi girin" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Sifre
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Sifrenizi girin" required autocomplete="current-password">
                        <button type="button" id="togglePassword" class="toggle-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-error" id="loginError" style="display: none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorMessage">Gecersiz kullanici adi veya sifre</span>
                </div>

                <button type="submit" id="loginBtn" class="login-btn">
                    <span class="btn-text">Giris Yap</span>
                    <span class="btn-loader" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i>
                    </span>
                </button>
            </form>

            <div class="login-footer">
                <div class="demo-credentials">
                    <p><i class="fas fa-info-circle"></i> Demo Hesaplari:</p>
                    <div class="credential-chips">
                        <button class="credential-chip" data-user="admin" data-pass="admin123">
                            <i class="fas fa-user-shield"></i> Admin
                        </button>
                        <button class="credential-chip" data-user="kullanici" data-pass="sifre123">
                            <i class="fas fa-user"></i> Kullanici
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
