# Eclipse Mosquitto MQTT Broker Konfigurasyonu

# Dinlenecek port
listener 1883

# WebSocket desteği
listener 9001
protocol websockets

# Anonim baglantilara izin ver (gelistirme icin)
allow_anonymous true

# Log ayarlari
log_dest stdout
log_type all

# Kalici mesaj deposu
persistence true
persistence_location /mosquitto/data/
